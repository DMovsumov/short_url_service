services:
  postgres:
    image: postgres:16-alpine
    container_name: short_url_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shorturl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shorturl_secret}
      POSTGRES_DB: ${POSTGRES_DB:-shorturl_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-shorturl} -d ${POSTGRES_DB:-shorturl_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - short_url_network

  redis:
    image: redis:7-alpine
    container_name: short_url_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - short_url_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: short_url_app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shorturl}:${POSTGRES_PASSWORD:-shorturl_secret}@postgres:5432/${POSTGRES_DB:-shorturl_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      SHORT_CODE_LENGTH: ${SHORT_CODE_LENGTH:-6}
      SHORT_URL_BASE: ${SHORT_URL_BASE:-http://localhost:8000}
      DEBUG: ${DEBUG:-false}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_HTTPONLY: ${COOKIE_HTTPONLY:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ACCESS_TOKEN_COOKIE_NAME: ${ACCESS_TOKEN_COOKIE_NAME:-access_token}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME:-refresh_token}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: /bin/sh -c "uv run alembic upgrade head && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - short_url_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  short_url_network:
    driver: bridge
